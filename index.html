<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wedding Album</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 20px;
    }
    img {
      margin: 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Wedding Album</h1>

  <input type="file" id="fileInput" accept="image/*" capture="environment" />
  <br /><br />
  <button id="uploadBtn">アップロード</button>

  <hr />
  <div id="gallery"></div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseClient = createClient(
      "https://vysdoicwyroygakdrwyt.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5c2RvaWN3eXJveWdha2Ryd3l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NDExMzEsImV4cCI6MjA4NzIxNzEzMX0.uBpCtpMy8pIHTi0bU3GkwcquW-15QcQOr6Pw58TNlAw"
    );

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const gallery = document.getElementById("gallery");

    uploadBtn.addEventListener("click", upload);

    // 🔥 画像圧縮関数
    async function compressImage(file, maxWidth = 1280, quality = 0.7) {
      const img = new Image();
      const reader = new FileReader();

      return new Promise((resolve) => {
        reader.onload = (e) => {
          img.src = e.target.result;
        };

        img.onload = () => {
          const scale = Math.min(maxWidth / img.width, 1);
          const canvas = document.createElement("canvas");
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          canvas.toBlob(
            (blob) => resolve(blob),
            "image/jpeg",
            quality
          );
        };

        reader.readAsDataURL(file);
      });
    }

    async function upload() {
      const file = fileInput.files[0];
      if (!file) {
        alert("写真を選んでね");
        return;
      }

      const compressedBlob = await compressImage(file);
      const fileName = Date.now() + ".jpg";

      const { error } = await supabaseClient.storage
        .from("photos")
        .upload(fileName, compressedBlob, {
          contentType: "image/jpeg"
        });

      if (error) {
        console.error(error);
        alert("アップロード失敗");
        return;
      }

      alert("アップロード成功！");
      fileInput.value = "";
      loadImages();
    }

    async function loadImages() {
      const { data, error } = await supabaseClient.storage
        .from("photos")
        .list("", {
          sortBy: { column: "created_at", order: "desc" }
        });

      if (error) {
        console.error(error);
        return;
      }

      gallery.innerHTML = "";

      data.forEach(file => {
        const { data: urlData } = supabaseClient.storage
          .from("photos")
          .getPublicUrl(file.name);

        const link = document.createElement("a");
        link.href = urlData.publicUrl;
        link.download = file.name;

        const img = document.createElement("img");
        img.src = urlData.publicUrl;
        img.width = 150;

        link.appendChild(img);
        gallery.appendChild(link);
      });
    }

    loadImages();
  </script>
</body>
</html>
